---
alias: cinema_resume
description: ""
triggers:
  - trigger: state
    entity_id:
      - media_player.plex_for_lg
    from: paused
    to: playing
    for:
      hours: 0
      minutes: 0
      seconds: 2
conditions:
  - condition: sun
    after: sunset
actions:
  - action: light.turn_off
    metadata: {}
    data:
      transition: 1
    target:
      entity_id: light.living_room_bulb_window_01
mode: single
