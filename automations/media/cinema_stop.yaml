---
  alias: cinema_stop
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - media_player.plex_for_lg
    from: playing
    to: idle
  conditions:
  - condition: sun
    after: sunset
  actions:
  - action: light.turn_on
    metadata: {}
    data:
      transition: 5
      brightness_pct: 50
    target:
      entity_id:
        - light.living_room_bulb_window
  mode: single