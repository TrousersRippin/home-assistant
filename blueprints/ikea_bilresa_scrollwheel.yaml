blueprint:
  name: IKEA BILRESA Scroll wheel button
  description: >
    Full-featured automation for the IKEA BILRESA Scroll Wheel via Matter.

    REQUIREMENTS:
    - ENABLE Sensors: 1, 2, 4, 5, 7, 8
    - ENABLE Events: 3, 6, 9
    - DISABLE Sensors: 3, 6, 9 (not needed)

  domain: automation
  author: Troy Rippin
  input:
    # ============================================================
    # LIGHT TARGET
    # ============================================================
    light_entity:
      name: "Light (or Group)"
      description: Select the light or helper group to control.
      selector:
        entity:
          domain: light

    # ============================================================
    # SCROLL ZONES
    # ============================================================
    scroll_logic_1_2:
      name: "Scroll Zone 1 (Sensors 1 & 2)"
      default: "brightness"
      selector: &scroll_options
        select:
          options:
            - label: "Brightness (Bright / Dark)"
              value: "brightness"
            - label: "Kelvin (Cool / Warm)"
              value: "kelvin"
            - label: "RGB Color (Rainbow)"
              value: "rgb"
            - label: "Presets (Work / Cozy)"
              value: "preset"

    scroll_logic_4_5:
      name: "Scroll Zone 2 (Sensors 4 & 5)"
      default: "kelvin"
      selector: *scroll_options

    scroll_logic_7_8:
      name: "Scroll Zone 3 (Sensors 7 & 8)"
      default: "preset"
      selector: *scroll_options

    # ============================================================
    # BUTTON CONFIGURATION
    # ============================================================

    # --- BUTTON 1 (LEFT/TOP) ---
    btn1_double:
      name: "Button 1: Double Click Action"
      default: "set_bright"
      selector: &double_options
        select:
          options:
            - label: "-> Bright (80%)"
              value: "set_bright"
            - label: "-> Cool White (4000K)"
              value: "set_cold"
            - label: "-> White (RGB Reset)"
              value: "set_white"
            - label: "-> Red (Signal Color)"
              value: "set_red"
            - label: "-> No Action"
              value: "none"

    btn1_hold:
      name: "Button 1: Hold Action"
      default: "set_dim"
      selector: &hold_options
        select:
          options:
            - label: "-> Dimmed (20%)"
              value: "set_dim"
            - label: "-> Warm White (2200K)"
              value: "set_warm"
            - label: "-> Enable Color (Saturation On)"
              value: "set_color_on"
            - label: "-> No Action"
              value: "none"

    # --- BUTTON 2 (MIDDLE) ---
    btn2_double:
      name: "Button 2: Double Click Action"
      default: "set_cold"
      selector: *double_options

    btn2_hold:
      name: "Button 2: Hold Action"
      default: "set_warm"
      selector: *hold_options

    # --- BUTTON 3 (RIGHT/BOTTOM) ---
    btn3_double:
      name: "Button 3: Double Click Action"
      default: "set_bright"
      selector: *double_options

    btn3_hold:
      name: "Button 3: Hold Action"
      default: "set_dim"
      selector: *hold_options

    # ============================================================
    # FINE TUNING
    # ============================================================
    step_pct:
      name: "Step Size: Brightness (%)"
      default: 10
      selector:
        number:
          min: 1
          max: 50
          unit_of_measurement: "%"

    step_kelvin:
      name: "Step Size: Kelvin (K)"
      default: 400
      selector:
        number:
          min: 100
          max: 1000
          unit_of_measurement: K

    step_hue:
      name: "Step Size: RGB Hue (°)"
      default: 15
      selector:
        number:
          min: 5
          max: 90
          unit_of_measurement: "°"

    val_bright:
      name: "Value: Bright (%)"
      default: 80
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"

    val_dim:
      name: "Value: Dim (%)"
      default: 20
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"

    val_cold:
      name: "Value: Cool (K)"
      default: 4000
      selector:
        number:
          min: 2000
          max: 6500
          unit_of_measurement: K

    val_warm:
      name: "Value: Warm (K)"
      default: 2200
      selector:
        number:
          min: 2000
          max: 6500
          unit_of_measurement: K

    # ============================================================
    # ENTITY MAPPING
    # ============================================================
    sensor_1:
      name: "Sensor 1 (Look for '(1)')"
      selector:
        entity:
          domain: sensor

    sensor_2:
      name: "Sensor 2 (Look for '(2)')"
      selector:
        entity:
          domain: sensor

    sensor_4:
      name: "Sensor 4 (Look for '(4)')"
      selector:
        entity:
          domain: sensor

    sensor_5:
      name: "Sensor 5 (Look for '(5)')"
      selector:
        entity:
          domain: sensor

    sensor_7:
      name: "Sensor 7 (Look for '(7)')"
      selector:
        entity:
          domain: sensor

    sensor_8:
      name: "Sensor 8 (Look for '(8)')"
      selector:
        entity:
          domain: sensor

    event_taste_1:
      name: "Event Button 1 (Look for '(3)')"
      selector:
        entity:
          domain: event

    event_taste_2:
      name: "Event Button 2 (Look for '(6)')"
      selector:
        entity:
          domain: event

    event_taste_3:
      name: "Event Button 3 (Look for '(9)')"
      selector:
        entity:
          domain: event

mode: single
max_exceeded: silent

variables:
  target_light: !input light_entity

  # Scroll logic
  m_sc_1: !input scroll_logic_1_2
  m_sc_2: !input scroll_logic_4_5
  m_sc_3: !input scroll_logic_7_8

  # Button actions
  b1_d: !input btn1_double
  b1_h: !input btn1_hold
  b2_d: !input btn2_double
  b2_h: !input btn2_hold
  b3_d: !input btn3_double
  b3_h: !input btn3_hold

  # Step and preset values
  s_p: !input step_pct
  s_k: !input step_kelvin
  s_h: !input step_hue
  v_bri: !input val_bright
  v_dim: !input val_dim
  v_cold: !input val_cold
  v_warm: !input val_warm

  # Event entity IDs
  id_e1: !input event_taste_1
  id_e2: !input event_taste_2
  id_e3: !input event_taste_3

triggers:
  # ----------------------------------------------------------
  # SCROLL ZONE 1
  # ----------------------------------------------------------
  - trigger: state
    entity_id: !input sensor_1
    id: sc_1_up
  - trigger: state
    entity_id: !input sensor_2
    id: sc_1_down

  # ----------------------------------------------------------
  # SCROLL ZONE 2
  # ----------------------------------------------------------
  - trigger: state
    entity_id: !input sensor_4
    id: sc_2_down
  - trigger: state
    entity_id: !input sensor_5
    id: sc_2_up

  # ----------------------------------------------------------
  # SCROLL ZONE 3
  # ----------------------------------------------------------
  - trigger: state
    entity_id: !input sensor_7
    id: sc_3_up
  - trigger: state
    entity_id: !input sensor_8
    id: sc_3_down

  # ----------------------------------------------------------
  # BUTTON EVENTS
  # ----------------------------------------------------------
  - trigger: state
    entity_id:
      - !input event_taste_1
      - !input event_taste_2
      - !input event_taste_3
    id: btn_event

conditions:
  - condition: template
    value_template: >-
      {{ trigger.from_state is defined and trigger.to_state is defined and
         trigger.from_state.state not in ['unknown', 'unavailable'] and
         trigger.to_state.state not in ['unknown', 'unavailable'] }}

actions:
  # ============================================================
  # SCROLL LOGIC
  # ============================================================
  - choose:
      - conditions: "{{ 'sc_' in trigger.id }}"
        sequence:
          - variables:
              direction: >
                {% if '_up' in trigger.id %} 1
                {% else %} -1
                {% endif %}
              active_func: >
                {% if 'sc_1' in trigger.id %} {{ m_sc_1 }}
                {% elif 'sc_2' in trigger.id %} {{ m_sc_2 }}
                {% elif 'sc_3' in trigger.id %} {{ m_sc_3 }}
                {% endif %}

          - choose:
              # --------------------------------------------------
              # BRIGHTNESS
              # --------------------------------------------------
              - conditions: "{{ active_func == 'brightness' }}"
                sequence:
                  - action: light.turn_on
                    target:
                      entity_id: "{{ target_light }}"
                    data:
                      brightness_step_pct: "{{ (s_p | float(default=10)) * direction }}"
                      transition: 0

              # --------------------------------------------------
              # KELVIN
              # --------------------------------------------------
              - conditions: "{{ active_func == 'kelvin' }}"
                sequence:
                  - action: light.turn_on
                    target:
                      entity_id: "{{ target_light }}"
                    data:
                      color_temp_kelvin: >
                        {% set current = state_attr(target_light, 'color_temp_kelvin') | int(default=3000) %}
                        {% set step = s_k | int(default=400) %}
                        {% if direction == 1 %} {{ ([current + step, 6500] | min) | int }}
                        {% else %} {{ ([current - step, 2000] | max) | int }}
                        {% endif %}
                      transition: 0

              # --------------------------------------------------
              # RGB
              # --------------------------------------------------
              - conditions: "{{ active_func == 'rgb' }}"
                sequence:
                  - action: light.turn_on
                    target:
                      entity_id: "{{ target_light }}"
                    data:
                      hs_color: >
                        {% set current_hs = state_attr(target_light, 'hs_color') %}
                        {% set h = current_hs[0] | float(default=0) if current_hs is not none else 0 %}
                        {% set s = current_hs[1] | float(default=100) if current_hs is not none else 100 %}
                        {% set step = s_h | float(default=15) %}
                        {{ [(h + (step * direction)) % 360, s] }}
                      transition: 0

              # --------------------------------------------------
              # PRESETS
              # --------------------------------------------------
              - conditions: "{{ active_func == 'preset' }}"
                sequence:
                  - action: light.turn_on
                    target:
                      entity_id: "{{ target_light }}"
                    data:
                      brightness_pct: "{{ v_bri if direction == 1 else v_dim }}"
                      color_temp_kelvin: "{{ v_cold if direction == 1 else v_warm }}"
                      transition: 1

  # ============================================================
  # BUTTON LOGIC
  # ============================================================
  - choose:
      - conditions: "{{ trigger.id == 'btn_event' }}"
        sequence:
          # --------------------------------------------------
          # SINGLE CLICK — TOGGLE
          # --------------------------------------------------
          - choose:
              - conditions: >
                  {{ trigger.to_state.attributes.event_type is defined and
                     trigger.to_state.attributes.event_type == 'multi_press_1' }}
                sequence:
                  - action: light.toggle
                    target:
                      entity_id: "{{ target_light }}"
                    data:
                      transition: 0.5

          # --------------------------------------------------
          # DOUBLE CLICK — CUSTOM
          # --------------------------------------------------
          - choose:
              - conditions: >
                  {{ trigger.to_state.attributes.event_type is defined and
                     trigger.to_state.attributes.event_type == 'multi_press_2' }}
                sequence:
                  - variables:
                      action_code: >
                        {% if trigger.entity_id == id_e1 %} {{ b1_d }}
                        {% elif trigger.entity_id == id_e2 %} {{ b2_d }}
                        {% elif trigger.entity_id == id_e3 %} {{ b3_d }}
                        {% endif %}
                  - choose:
                      - conditions: "{{ action_code == 'set_bright' }}"
                        sequence:
                          - action: light.turn_on
                            target:
                              entity_id: "{{ target_light }}"
                            data:
                              brightness_pct: "{{ v_bri }}"
                              transition: 0.5
                      - conditions: "{{ action_code == 'set_cold' }}"
                        sequence:
                          - action: light.turn_on
                            target:
                              entity_id: "{{ target_light }}"
                            data:
                              color_temp_kelvin: "{{ v_cold }}"
                              transition: 0.5
                      - conditions: "{{ action_code == 'set_white' }}"
                        sequence:
                          - action: light.turn_on
                            target:
                              entity_id: "{{ target_light }}"
                            data:
                              color_temp_kelvin: 4000
                              transition: 0.5
                      - conditions: "{{ action_code == 'set_red' }}"
                        sequence:
                          - action: light.turn_on
                            target:
                              entity_id: "{{ target_light }}"
                            data:
                              hs_color: [0, 100]
                              brightness_pct: 80
                              transition: 0.5

          # --------------------------------------------------
          # HOLD — CUSTOM
          # --------------------------------------------------
          - choose:
              - conditions: >
                  {{ trigger.to_state.attributes.event_type is defined and
                     trigger.to_state.attributes.event_type == 'long_press' }}
                sequence:
                  - variables:
                      action_code: >
                        {% if trigger.entity_id == id_e1 %} {{ b1_h }}
                        {% elif trigger.entity_id == id_e2 %} {{ b2_h }}
                        {% elif trigger.entity_id == id_e3 %} {{ b3_h }}
                        {% endif %}
                  - choose:
                      - conditions: "{{ action_code == 'set_dim' }}"
                        sequence:
                          - action: light.turn_on
                            target:
                              entity_id: "{{ target_light }}"
                            data:
                              brightness_pct: "{{ v_dim }}"
                              transition: 0.5
                      - conditions: "{{ action_code == 'set_warm' }}"
                        sequence:
                          - action: light.turn_on
                            target:
                              entity_id: "{{ target_light }}"
                            data:
                              color_temp_kelvin: "{{ v_warm }}"
                              transition: 0.5
                      - conditions: "{{ action_code == 'set_color_on' }}"
                        sequence:
                          - action: light.turn_on
                            target:
                              entity_id: "{{ target_light }}"
                            data:
                              hs_color: [0, 100]
                              brightness_pct: 80
                              transition: 0.5

  # V1.0.1+ FIX: 150ms dead-time after any action to suppress switch bouncing
  - delay:
      milliseconds: 150
